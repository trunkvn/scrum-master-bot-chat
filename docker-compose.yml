services:
  # Service 1: Database MySQL
  mysql-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: gtech_scrum_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service 2: G-Tech Bot
  scrum-bot:
    build: .
    restart: always
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      GROQ_API_KEY: ${GROQ_API_KEY}
      DATABASE_URL: "mysql://root:root_password@mysql-db:3306/gtech_scrum_db"
      LOG_LEVEL: "info"
      TZ: "Asia/Ho_Chi_Minh"

volumes:
  mysql_data: